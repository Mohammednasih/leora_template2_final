<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save the Date | Wedding Invitation</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-B4-71dHj.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BUCqkv84.css">
  </head>
  <body>
    <main>
      <!-- Section 1: Landing -->
      <section class="screen-section" id="section-1">
        <div class="media-container" id="media-1">
          <img src="/images/page1.jpg" alt="Welcome" class="ambient-img">
          <img src="/images/page1.jpg" alt="Welcome" class="main-img parallax-img">
        </div>
      </section>

      <!-- Section 2 -->
      <section class="screen-section" id="section-2">
        <div class="media-container" id="media-2">
          <img src="/images/page2.jpg" alt="Awaiting" class="ambient-img">
          <img src="/images/page2.jpg" alt="Awaiting" class="main-img parallax-img">
        </div>
      </section>
      
      <!-- Section 3: Save the Date -->
      <section class="screen-section date-section" id="section-date">
        <div class="green-path">
          <h2 class="title date-header">Save the Date</h2>
          <p class="subtitle date-subtitle">Scratch to reveal</p>
          
          <div class="circles-wrapper">
            <div class="scratch-circle-container">
              <div class="revealed-text">OCT</div>
              <canvas class="scratch-canvas" id="canvas-1"></canvas>
            </div>
            <div class="scratch-circle-container">
              <div class="revealed-text">25</div>
              <canvas class="scratch-canvas" id="canvas-2"></canvas>
            </div>
            <div class="scratch-circle-container">
              <div class="revealed-text">2026</div>
              <canvas class="scratch-canvas" id="canvas-3"></canvas>
            </div>
          </div>
        </div>

        <img src="/images/rose.png" alt="Rose" class="rose-img" id="rose-img">

        <a href="https://maps.google.com" target="_blank" class="map-link-container">
          <!-- Placeholder aesthetic map image (user can swap with their own map image later) -->
          <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=600&q=80" alt="View Map" class="map-preview-img">
          <div class="map-overlay">
             <span class="map-icon">📍</span> Open in Maps
          </div>
        </a>
      </section>

      <!-- Section 4: Venue -->
      <section class="screen-section venue-section" id="section-venue">
        <div class="venue-bg-container">
          <img src="/images/newvenue.png" alt="Venue Background" class="venue-img" id="venue-parallax">
          <!-- Gradient overlay -->
          <div class="venue-gradient"></div>
        </div>
        <div class="venue-bottom-content">
          <h2 class="venue-title">The Grand Palace</h2>
          <p class="venue-location">123 Wedding Lane, Cityville</p>
          <p class="venue-timing">Reception at 7:00 PM</p>
        </div>
      </section>

      <!-- Section 5: Final -->
      <section class="screen-section standard-section final-section" id="section-final">
        <div class="final-container">
          <h2 class="title finale-title">Thank You</h2>
          <p class="finale-subtitle">We can't wait to see you there.</p>
          <img src="/images/hub1.png" alt="Couple" class="hub-image" id="hub-image">
        </div>
      </section>
    </main>
  </body>
</html>
